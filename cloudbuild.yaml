substitutions:
  _PROJECT_ID: 'realcoderzdemo'
  _REGION: 'us-central1'
  _SERVICE_NAME: 'django-crud-mysql'
  _IMAGE_NAME: 'django-crud-mysql'
  _PORT: '8000'
  _CLOUDSQL_INSTANCE: 'realcoderzdemo:us-central1:demo'

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '-t'
      - 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:latest'
      - '.'

  # Step 2: Push image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:${COMMIT_SHA}']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:latest']

  # Step 3: Deploy to Cloud Run with secrets injected from Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '${_PORT}'
      - '--project'
      - '${_PROJECT_ID}'
      # Connect to Cloud SQL via Unix socket
      - '--add-cloudsql-instances'
      - '${_CLOUDSQL_INSTANCE}'
      # Inject secrets as env vars from Secret Manager (latest version)
      - '--set-secrets'
      - 'DB_USER=demo-db-user:latest,DB_PASSWORD=demo-db-password:latest'
      # Non-secret env vars as plain substitutions
      - '--set-env-vars'
      - 'DB_HOST=/cloudsql/${_CLOUDSQL_INSTANCE},DB_PORT=3306'

images:
  - 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:${COMMIT_SHA}'
  - 'gcr.io/${_PROJECT_ID}/${_IMAGE_NAME}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
