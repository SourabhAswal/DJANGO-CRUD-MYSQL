steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/realcoderzdemo/django-crud-mysql:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/realcoderzdemo/django-crud-mysql:latest'
      - '.'

  # Step 2: Push image to GCR Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/realcoderzdemo/django-crud-mysql:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/realcoderzdemo/django-crud-mysql:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'django-crud-mysql'
      - '--image'
      - 'gcr.io/realcoderzdemo/django-crud-mysql:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8000'
      - '--project'
      - 'realcoderzdemo'

images:
  - 'gcr.io/realcoderzdemo/django-crud-mysql:$COMMIT_SHA'
  - 'gcr.io/realcoderzdemo/django-crud-mysql:latest'

options:
  logging: CLOUD_LOGGING_ONLY
